<header class="site-header" [class.is-scrolled]="isScrolled">
  <div class="site-header__inner">
    <!-- Brand -->
    <a routerLink="/" class="brand" aria-label="Teddy City Hotels — home">
      <span class="brand__mark">Teddy City</span>
      <span class="brand__suffix">Hotels</span>
    </a>

    <!-- Desktop nav -->
    <nav class="nav" aria-label="Primary">
      <ul class="nav__list">
        <li *ngFor="let link of navLinks" class="nav__item" [class.has-dropdown]="link.dropdown">
          <a *ngIf="!link.dropdown"
             [routerLink]="link.href"
             routerLinkActive="is-active"
             [routerLinkActiveOptions]="{ exact: false }">
            {{ link.label }}
          </a>

          <ng-container *ngIf="link.dropdown">
            <button type="button" class="nav__trigger" (click)="toggleDropdown($event)">
              {{ link.label }}
              <span class="nav__chev" aria-hidden="true"></span>
            </button>
            <div class="nav__panel" role="menu">
              <a *ngFor="let item of link.dropdown"
                 [routerLink]="item.href"
                 routerLinkActive="is-active">
                {{ item.label }}
              </a>
            </div>
          </ng-container>
        </li>
      </ul>
    </nav>

    <!-- Right cluster -->
    <div class="actions">
      <a routerLink="/hotels" class="actions__cta">Reserve</a>
      <button class="burger" (click)="toggleMobileMenu()" [attr.aria-expanded]="isMobileMenuOpen" aria-label="Menu">
        <span class="burger__line" [class.is-open]="isMobileMenuOpen"></span>
      </button>
    </div>
  </div>

  <!-- Mobile drawer -->
  <div class="mobile-drawer" [class.is-open]="isMobileMenuOpen">
    <nav class="mobile-nav" aria-label="Primary mobile">
      <ul>
        <li *ngFor="let link of navLinks" [class.has-dropdown]="link.dropdown">
          <a *ngIf="!link.dropdown"
             [routerLink]="link.href"
             routerLinkActive="is-active"
             (click)="closeMobileMenu()">{{ link.label }}</a>

          <ng-container *ngIf="link.dropdown">
            <button type="button" class="mobile-nav__trigger" (click)="toggleMobileDropdown($event)">
              {{ link.label }}
              <span class="mobile-nav__chev">{{ getMobileDropdownIcon(link) === 'arrow_drop_up' ? '−' : '+' }}</span>
            </button>
            <div class="mobile-nav__panel" [class.is-open]="isMobileDropdownOpen(link)">
              <a *ngFor="let item of link.dropdown"
                 [routerLink]="item.href"
                 routerLinkActive="is-active"
                 (click)="closeMobileMenu()">{{ item.label }}</a>
            </div>
          </ng-container>
        </li>
        <li>
          <a routerLink="/hotels" class="mobile-cta" (click)="closeMobileMenu()">Reserve a stay</a>
        </li>
      </ul>
    </nav>
  </div>
</header>
