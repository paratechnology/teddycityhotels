<!-- Urban Oasis Header -->
<header class="main-header" [class.scrolled]="isScrolled">
  <div class="header-content container">

    <!-- Logo -->
    <div class="logo">
      <a routerLink="/">Teddy City Hotels</a>
    </div>

    <!-- Desktop Navigation -->
    <nav class="desktop-nav">
      <div *ngFor="let link of navLinks" class="nav-item">
        <a *ngIf="!link.dropdown"
           [routerLink]="link.href"
           routerLinkActive="active-link"
           [routerLinkActiveOptions]="{exact: true}">
          {{ link.label }}
        </a>
        <div *ngIf="link.dropdown" class="dropdown">
          <a (click)="toggleDropdown($event)"
             [class.active-link]="isDropdownActive(link.dropdown)">
            {{ link.label }}
            <i class="material-icons">arrow_drop_down</i>
          </a>
          <div class="dropdown-menu">
            <a *ngFor="let item of link.dropdown"
               [routerLink]="item.href"
               routerLinkActive="active-link"
               [routerLinkActiveOptions]="{exact: true}">
              {{ item.label }}
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Header Actions -->
    <div class="header-actions">
      <a routerLink="/properties" class="btn btn-primary">Book a Stay</a>
      <!-- Mobile Menu Button -->
      <button class="mobile-menu-btn" (click)="toggleMobileMenu()">
        <i class="material-icons">{{ isMobileMenuOpen ? 'close' : 'menu' }}</i>
      </button>
    </div>
  </div>

  <!-- Mobile Navigation Overlay -->
  <div class="mobile-nav-overlay" [class.open]="isMobileMenuOpen">
    <nav class="mobile-nav">
      <div *ngFor="let link of navLinks" class="mobile-nav-item">
        <a *ngIf="!link.dropdown"
           [routerLink]="link.href"
           routerLinkActive="active-link"
           [routerLinkActiveOptions]="{exact: true}"
           (click)="closeMobileMenu()">
          {{ link.label }}
        </a>
        <div *ngIf="link.dropdown" class="mobile-dropdown">
          <a (click)="toggleMobileDropdown($event)">
            {{ link.label }}
            <i class="material-icons">{{ getMobileDropdownIcon(link) }}</i>
          </a>
          <div class="mobile-dropdown-menu" [class.open]="isMobileDropdownOpen(link)">
            <a *ngFor="let item of link.dropdown"
               [routerLink]="item.href"
               routerLinkActive="active-link"
               [routerLinkActiveOptions]="{exact: true}"
               (click)="closeMobileMenu()">
              {{ item.label }}
            </a>
          </div>
        </div>
      </div>
    </nav>
  </div>
</header>
