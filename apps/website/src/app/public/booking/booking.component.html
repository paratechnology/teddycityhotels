<div class="booking-page" *ngIf="room$ | async as room">
  <div class="room-summary">
    <h2>{{ room.name }}</h2>
    <p>{{ room.description }}</p>
    <div class="price">
      <span>${{ room.price }}</span> / night
    </div>
  </div>

  <form [formGroup]="bookingForm" (ngSubmit)="onSubmit()" class="booking-form">
    <h3>Book Your Stay</h3>
    <div class="form-field">
      <label for="checkInDate">Check-in Date</label>
      <input type="date" id="checkInDate" formControlName="checkInDate" />
    </div>
    <div class="form-field">
      <label for="checkOutDate">Check-out Date</label>
      <input type="date" id="checkOutDate" formControlName="checkOutDate" />
    </div>
    <div class="form-field">
      <label for="numberOfGuests">Number of Guests</label>
      <input type="number" id="numberOfGuests" formControlName="numberOfGuests" />
    </div>
    <div class="form-field">
      <label for="guestName">Guest Name</label>
      <input type="text" id="guestName" formControlName="guestName" />
    </div>
    <div class="form-field">
      <label for="guestEmail">Guest Email</label>
      <input type="email" id="guestEmail" formControlName="guestEmail" />
    </div>
    <div class="form-field">
      <label for="guestPhone">Guest Phone</label>
      <input type="text" id="guestPhone" formControlName="guestPhone" />
    </div>
    <div class="form-field">
      <label for="notes">Notes</label>
      <textarea id="notes" formControlName="notes"></textarea>
    </div>
    <button type="submit" [disabled]="!bookingForm.valid" class="btn btn-primary">Book Now</button>
  </form>
</div>
