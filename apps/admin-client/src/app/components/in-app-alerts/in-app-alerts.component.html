<section class="alerts-layer" *ngIf="alertsService.alerts$ | async as alerts">
  <article class="alert-card" *ngFor="let alert of alerts" (click)="open(alert)">
    <header>
      <strong>{{ alert.title }}</strong>
      <button type="button" (click)="dismiss(alert.id, $event)">x</button>
    </header>
    <p>{{ alert.message }}</p>
  </article>
</section>
