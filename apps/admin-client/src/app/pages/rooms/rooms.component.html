<section class="page">
  <header>
    <h2>Rooms Management</h2>
    <a routerLink="/rooms/new" class="button">Add New Room</a>
  </header>

  <p class="error" *ngIf="error">{{ error }}</p>
  <p *ngIf="loading">Loading rooms...</p>

  <table *ngIf="!loading && rooms.length">
    <thead>
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Occupancy</th>
        <th>Price</th>
        <th>Available</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let room of rooms">
        <td>{{ room.name }}</td>
        <td>{{ room.type }}</td>
        <td>{{ room.maxOccupancy }}</td>
        <td>{{ room.price | currency : 'NGN' }}</td>
        <td>{{ room.availability?.isAvailable ? 'Yes' : 'No' }}</td>
        <td>
          <a [routerLink]="['/rooms/edit', room.id]">Edit</a>
          <button (click)="deleteRoom(room.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="!loading && !rooms.length">No rooms found.</p>
</section>
