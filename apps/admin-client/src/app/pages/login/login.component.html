<section class="login-page">
  <article class="login-card">
    <h1>
      {{
        view === 'login'
          ? 'Admin Login'
          : view === 'request-reset'
          ? 'Reset Password'
          : 'Set New Password'
      }}
    </h1>
    <p *ngIf="view === 'login'">Sign in to manage Teddy City Hotels operations.</p>
    <p *ngIf="view === 'request-reset'">Enter your admin email to receive a 6-digit reset code.</p>
    <p *ngIf="view === 'confirm-reset'">Use the code from your email to create a new password.</p>

    <p class="error" *ngIf="error">{{ error }}</p>
    <p class="info" *ngIf="info">{{ info }}</p>

    <form *ngIf="view === 'login'" [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Email
        <input type="email" formControlName="email" autocomplete="email" />
      </label>

      <label>
        Password
        <input type="password" formControlName="password" autocomplete="current-password" />
      </label>

      <button type="submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>

      <button type="button" class="link-btn" (click)="startResetFlow()">Forgot password?</button>
    </form>

    <form *ngIf="view === 'request-reset'" [formGroup]="requestResetForm" (ngSubmit)="requestResetCode()">
      <label>
        Email
        <input type="email" formControlName="email" autocomplete="email" />
      </label>

      <button type="submit" [disabled]="loading || requestResetForm.invalid">
        {{ loading ? 'Sending code...' : 'Send reset code' }}
      </button>

      <button type="button" class="link-btn" (click)="backToLogin()">Back to login</button>
    </form>

    <form *ngIf="view === 'confirm-reset'" [formGroup]="resetForm" (ngSubmit)="submitResetPassword()">
      <label>
        Email
        <input type="email" [value]="resetEmail" disabled />
      </label>

      <label>
        Reset code
        <input type="text" formControlName="code" inputmode="numeric" maxlength="6" autocomplete="one-time-code" />
      </label>

      <label>
        New password
        <input type="password" formControlName="password" autocomplete="new-password" />
      </label>

      <label>
        Confirm new password
        <input type="password" formControlName="confirmPassword" autocomplete="new-password" />
      </label>

      <button type="submit" [disabled]="loading || resetForm.invalid">
        {{ loading ? 'Updating password...' : 'Update password' }}
      </button>

      <button type="button" class="link-btn" (click)="backToLogin()">Back to login</button>
    </form>
  </article>
</section>
