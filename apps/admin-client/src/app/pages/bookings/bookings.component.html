<h2>Bookings Management</h2>

<div *ngIf="bookings$ | async as bookings; else loading">
  <ng-container *ngIf="bookings.length > 0; else noBookings">
    <table>
      <thead>
        <tr>
          <th>Room ID</th>
          <th>User ID</th>
          <th>Check-in Date</th>
          <th>Check-out Date</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let booking of bookings">
          <td>{{ booking.roomId }}</td>
          <td>{{ booking.userId }}</td>
          <td>{{ booking.checkInDate.toDate() | date:'short' }}</td>
          <td>{{ booking.checkOutDate.toDate() | date:'short' }}</td>
          <td>{{ booking.status }}</td>
          <td>
            <button>Edit</button>
            <button (click)="cancelBooking(booking)" [disabled]="booking.status === 'cancelled'">Cancel</button>
          </td>
        </tr>
      </tbody>
    </table>
  </ng-container>
  <ng-template #noBookings>
    <p>No bookings found.</p>
  </ng-template>
</div>
<ng-template #loading>
  <p>Loading bookings...</p>
</ng-template>
